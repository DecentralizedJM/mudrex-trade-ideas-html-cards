<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trade Idea Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f1117;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 32px 16px;
    }

    .carousel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .trade-card {
      width: 100%;
      max-width: 360px;
      background: #ffffff;
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
    }

    /* Header */
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 28px;
    }

    .header-left {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .coin-icon {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #f7931a;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .coin-icon svg {
      width: 22px;
      height: 22px;
    }

    .pair-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pair-name {
      font-size: 16px;
      font-weight: 700;
      color: #111111;
      letter-spacing: -0.02em;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 999px;
      background: #e6f4ea;
      color: #1a7f37;
      font-size: 11px;
      font-weight: 600;
      line-height: 1.2;
    }

    .timestamp {
      margin-top: 4px;
      font-size: 12px;
      color: #888888;
      font-weight: 400;
    }

    .header-right {
      text-align: right;
    }

    .potential-value {
      font-size: 18px;
      font-weight: 700;
      color: #28a745;
      letter-spacing: -0.02em;
    }

    .potential-label {
      margin-top: 2px;
      font-size: 12px;
      color: #888888;
    }

    /* Timeline */
    .timeline {
      margin-bottom: 28px;
    }

    .timeline-points {
      position: relative;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 4px;
    }

    .timeline-points::before {
      content: "";
      position: absolute;
      top: 9px;
      left: 12.5%;
      right: 12.5%;
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(
        to right,
        #e8e8e8 0%,
        #e8e8e8 33.33%,
        #28a745 33.33%,
        #28a745 66.66%,
        #e8e8e8 66.66%,
        #e8e8e8 100%
      );
      z-index: 0;
    }

    .timeline-point {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .point-marker {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
      position: relative;
      z-index: 1;
      background: #ffffff;
    }

    .point-marker--stop-loss {
      background: #ffffff;
      border: 2.5px solid #dc3545;
    }

    .point-marker--entry {
      background: #3f51b5;
      border: none;
    }

    .point-marker--tp1 {
      background: #28a745;
      border: none;
    }

    .point-marker--tp2 {
      background: #ffffff;
      border: 2.5px solid #28a745;
    }

    .point-marker svg {
      width: 11px;
      height: 11px;
    }

    .point-label {
      font-size: 11px;
      color: #888888;
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .point-value {
      font-size: 13px;
      font-weight: 700;
      color: #111111;
      letter-spacing: -0.01em;
    }

    /* Footer */
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .current-price-label {
      font-size: 12px;
      color: #888888;
      margin-bottom: 4px;
    }

    .current-price-value {
      font-size: 20px;
      font-weight: 700;
      color: #111111;
      letter-spacing: -0.02em;
    }

    .btn-buy {
      appearance: none;
      border: none;
      cursor: pointer;
      background: #28a745;
      color: #ffffff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      padding: 14px 24px;
      border-radius: 12px;
      white-space: nowrap;
      transition: background 0.15s ease;
    }

    .btn-buy:hover {
      background: #218838;
    }

    .btn-buy:active {
      background: #1e7e34;
    }

    /* Pagination */
    .pagination {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.35);
    }

    .dot--active {
      background: #3f51b5;
    }
  </style>
</head>
<body>
  <div class="carousel">
    <article class="trade-card">
      <!-- Header -->
      <header class="card-header">
        <div class="header-left">
          <div class="coin-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M16.5 10.5c.2-1.3-.8-2-2.1-2.5l.4-1.8-1-.3-.4 1.7c-.3-.1-.6-.2-.9-.3l.4-1.7-1-.3-.4 1.8c-.2 0-.5-.1-.7-.1l-1.3-.4-.3 1s.7.2.7.2c.4.1.5.4.5.7l-.5 2.1c0 .1 0 .1-.1.1l-.7 2.8c0 .1-.1.2-.3.2-.1 0-.2 0-.3-.1l-1.8-.5-.6 1.4 1.3.3c.2.1.5.1.7.2l-.5 1.8 1 .3.5-1.8c.3.1.6.2.9.3l-.5 1.8 1 .3.5-1.8c1.9.4 3.3.2 3.9-1.5.5-1.4 0-2.2-1-2.7.7-.2 1.3-.7 1.4-1.8zm-2.5 3.9c-.3 1.3-2.4.6-3.1.4l.6-2.2c.7.2 2.9.6 2.5 1.8zm.3-3.9c-.3 1.2-2.1.6-2.7.4l.5-2.1c.6.2 2.4.5 2.2 1.7z" fill="white"/>
            </svg>
          </div>
          <div>
            <div class="pair-row">
              <h1 class="pair-name">BTC • USDT</h1>
              <span class="badge">Long 2X</span>
            </div>
            <p class="timestamp">12:02 PM • 23 Jun 2025</p>
          </div>
        </div>
        <div class="header-right">
          <div class="potential-value">+9.96%</div>
          <div class="potential-label">Potential</div>
        </div>
      </header>

      <!-- Timeline -->
      <section class="timeline" aria-label="Trade price levels">
        <div class="timeline-points">
          <div class="timeline-point">
            <div class="point-marker point-marker--stop-loss" aria-hidden="true"></div>
            <span class="point-label">Stop Loss</span>
            <span class="point-value">$39,900.00</span>
          </div>
          <div class="timeline-point">
            <div class="point-marker point-marker--entry" aria-hidden="true">
              <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M2.5 6L5 8.5L9.5 3.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span class="point-label">Entry Price</span>
            <span class="point-value">$40,000.00</span>
          </div>
          <div class="timeline-point">
            <div class="point-marker point-marker--tp1" aria-hidden="true">
              <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M2.5 6L5 8.5L9.5 3.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span class="point-label">Take Profit 1</span>
            <span class="point-value">$41,000.00</span>
          </div>
          <div class="timeline-point">
            <div class="point-marker point-marker--tp2" aria-hidden="true"></div>
            <span class="point-label">Take Profit 2</span>
            <span class="point-value">$42,000.00</span>
          </div>
        </div>
      </section>

      <!-- Footer -->
      <footer class="card-footer">
        <div>
          <div class="current-price-label">Current Price</div>
          <div class="current-price-value">$40,900.00</div>
        </div>
        <button type="button" class="btn-buy">Buy/ Long</button>
      </footer>
    </article>

    <nav class="pagination" aria-label="Trade idea slides">
      <span class="dot dot--active" aria-current="true"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </nav>
  </div>
</body>
</html>
